{% extends "base.html" %}
{% set hide_nav = True %}

{% block content %}
<div class="auth-container">
    <div class="col-md-5 col-lg-4 mt-5 mb-5">
        <div class="card glass-card p-4">
            <div class="text-center mb-4">
                <h2 class="fw-bold text-primary">Register</h2>
                <p class="text-muted">Create an account to get started</p>
            </div>
            
            {% if request.query_params.error %}
            <div class="alert alert-danger">{{ request.query_params.error }}</div>
            {% endif %}

            <form method="POST" action="/register">
                <div class="mb-3">
                    <label class="form-label fw-medium">Full Name</label>
                    <input type="text" name="name" class="form-control" required placeholder="John Doe">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-medium">Email address</label>
                    <input type="email" name="email" class="form-control" required placeholder="name@example.com">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-medium">Role</label>
                    <select name="role" class="form-select">
                        <option value="student">Student</option>
                        <option value="teacher">Teacher</option>
                    </select>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-medium">Password</label>
                    <input type="password" name="password" class="form-control" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn btn-primary-custom w-100">Register</button>
            </form>
            <div class="text-center mt-4">
                <span class="text-muted">Already have an account? <a href="/login" class="text-decoration-none">Login</a></span>
            </div>
        </div>
    </div>
</div>
{% endblock %}
