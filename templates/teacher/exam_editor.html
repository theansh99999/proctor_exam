{% extends "base.html" %}

{% block content %}
<div class="mb-4">
    <a href="/teacher/dashboard" class="text-decoration-none">&larr; Back to Dashboard</a>
</div>

<div class="card glass-card mb-5">
    <div class="card-body p-4">
        <h3 class="fw-bold mb-4">Create New Exam</h3>

        <div class="row mb-3">
            <div class="col-md-6 mb-3">
                <label class="form-label fw-medium">Exam Title</label>
                <input type="text" id="exam_title" class="form-control" placeholder="Midterm Exam">
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label fw-medium">Group</label>
                <select id="exam_group" class="form-select">
                    {% for group in groups %}
                    <option value="{{ group.id }}">{{ group.name }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <div class="row mb-4">
            <div class="col-md-4 mb-3">
                <label class="form-label fw-medium">Start Time</label>
                <input type="datetime-local" id="start_time" class="form-control">
            </div>
            <div class="col-md-4 mb-3">
                <label class="form-label fw-medium">End Time</label>
                <input type="datetime-local" id="end_time" class="form-control">
            </div>
            <div class="col-md-4 mb-3">
                <label class="form-label fw-medium">Duration (minutes)</label>
                <input type="number" id="duration" class="form-control" value="60">
            </div>
        </div>

        <div class="row mb-4">
            <div class="col-md-3 mb-3">
                <label class="form-label fw-medium">Timer Mode</label>
                <select id="timer_type" class="form-select" onchange="toggleTimerSettings()">
                    <option value="overall">Overall Exam Timer</option>
                    <option value="per_question">Per Question Timer</option>
                </select>
            </div>
            <div class="col-md-3 mb-3">
                <label class="form-label fw-medium">Default Marks</label>
                <input type="number" step="0.5" id="default_marks" class="form-control" value="1" min="0"
                    oninput="calculateTotalMarks()">
            </div>
            <div class="col-md-3 mb-3">
                <label class="form-label fw-medium">Negative Marks</label>
                <input type="number" step="0.1" id="default_negative_marks" class="form-control" value="0">
            </div>
            <div class="col-md-3 mb-3">
                <label class="form-label fw-medium text-success">Passing Marks</label>
                <input type="number" step="0.5" id="passing_marks" class="form-control" value="0" min="0">
            </div>
        </div>

        <hr class="mb-4">
        <h4 class="fw-bold mb-3">Questions</h4>

        <div id="questions_container"></div>

        <button type="button" class="btn btn-outline-primary mt-3 mb-4" onclick="addQuestion()">+ Add Question</button>

        <hr>
        <div class="d-flex justify-content-between align-items-center">
            <div class="p-3 bg-secondary bg-opacity-10 rounded shadow-sm border border-secondary border-opacity-25">
                <span class="fs-5 fw-bold text-body-emphasis">Total Possible Marks: <span class="text-primary fs-4 ms-2"
                        id="total_marks_display">0.0</span></span>
            </div>
            <button type="button" class="btn btn-primary-custom" onclick="submitExam()">Create Exam</button>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    let questions = [];

    function addQuestion() {
        const qId = questions.length;
        questions.push({ text: '', marks: null, negative_marks: null, time_limit_seconds: null, options: [{ text: '', correct: true }, { text: '', correct: false }] });
        renderQuestions();
        calculateTotalMarks();
    }

    function removeQuestion(qId) {
        questions.splice(qId, 1);
        renderQuestions();
        calculateTotalMarks();
    }

    function updateQuestionField(qId, field, value) {
        if (value === "") questions[qId][field] = null;
        else questions[qId][field] = parseFloat(value);
        if (field === 'marks') calculateTotalMarks();
    }

    function updateQuestion(qId, text) {
        questions[qId].text = text;
    }

    function addOption(qId) {
        questions[qId].options.push({ text: '', correct: false });
        renderQuestions();
    }

    function updateOption(qId, oId, text) {
        questions[qId].options[oId].text = text;
    }

    function setCorrectOption(qId, oId) {
        questions[qId].options.forEach((opt, idx) => {
            opt.correct = (idx === oId);
        });
        renderQuestions();
    }

    function calculateTotalMarks() {
        const defaultMarks = parseFloat(document.getElementById('default_marks').value) || 0;
        let total = 0;
        for (let q of questions) {
            if (q.marks !== null && q.marks !== undefined) {
                total += parseFloat(q.marks) || 0;
            } else {
                total += defaultMarks;
            }
        }
        document.getElementById('total_marks_display').innerText = total.toFixed(1);
    }

    function toggleTimerSettings() {
        const timerType = document.getElementById('timer_type').value;
        const durationWrapper = document.getElementById('duration').closest('.col-md-4');
        if (timerType === 'per_question') {
            durationWrapper.style.display = 'none';
        } else {
            durationWrapper.style.display = 'block';
        }
        renderQuestions();
    }

    function renderQuestions() {
        const container = document.getElementById('questions_container');
        container.innerHTML = '';

        questions.forEach((q, qId) => {
            let timeLimitHtml = '';
            if (document.getElementById('timer_type') && document.getElementById('timer_type').value === 'per_question') {
                timeLimitHtml = `
                    <div class="col-md-4">
                        <label class="form-label small text-muted">Time Limit (Seconds)</label>
                        <input type="number" class="form-control form-control-sm" placeholder="e.g. 60" value="${q.time_limit_seconds || ''}" oninput="updateQuestionField(${qId}, 'time_limit_seconds', this.value)">
                    </div>
                `;
            }

            let html = `
            <div class="card mb-4 border bg-transparent">
                <div class="card-body">
                    <h6 class="fw-bold">Question ${qId + 1} <button type="button" class="btn btn-sm btn-link text-danger float-end py-0" onclick="removeQuestion(${qId})">Remove</button></h6>
                    <input type="text" class="form-control mb-3" placeholder="Enter question text" value="${q.text}" oninput="updateQuestion(${qId}, this.value)">
                    
                    <div class="row mb-3">
                        <div class="col-md-4">
                            <label class="form-label small text-muted">Override Marks (Optional)</label>
                            <input type="number" step="0.5" class="form-control form-control-sm" placeholder="Uses default if empty" value="${q.marks !== null ? q.marks : ''}" oninput="updateQuestionField(${qId}, 'marks', this.value)">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label small text-muted">Override Negative Marks (Optional)</label>
                            <input type="number" step="0.1" class="form-control form-control-sm" placeholder="Uses default if empty" value="${q.negative_marks !== null ? q.negative_marks : ''}" oninput="updateQuestionField(${qId}, 'negative_marks', this.value)">
                        </div>
                        ${timeLimitHtml}
                    </div>

                    <div class="ps-3 border-start border-3 border-primary">
            `;

            q.options.forEach((opt, oId) => {
                html += `
                    <div class="input-group mb-2">
                        <div class="input-group-text">
                            <input class="form-check-input mt-0" type="radio" name="correct_q${qId}" onchange="setCorrectOption(${qId}, ${oId})" ${opt.correct ? 'checked' : ''}>
                        </div>
                        <input type="text" class="form-control" placeholder="Option text" value="${opt.text}" oninput="updateOption(${qId}, ${oId}, this.value)">
                    </div>
                `;
            });

            html += `
                    <button type="button" class="btn btn-sm btn-secondary mt-2" onclick="addOption(${qId})">+ Add Option</button>
                    </div>
                </div>
            </div>
            `;
            container.innerHTML += html;
        });
    }

    async function submitExam() {
        const title = document.getElementById('exam_title').value.trim();
        if (!title) {
            alert('Please enter an exam title.');
            return;
        }

        const startTimeInput = document.getElementById('start_time').value;
        const endTimeInput = document.getElementById('end_time').value;

        if (!startTimeInput || !endTimeInput) {
            alert('Please select both start and end times.');
            return;
        }

        const startTime = new Date(startTimeInput);
        const endTime = new Date(endTimeInput);
        const now = new Date();

        // Give 15 minutes of leeway just in case it takes time to fill out the form
        const leewayTime = new Date(now.getTime() - 15 * 60000);

        if (startTime < leewayTime) {
            alert('Exam start time cannot be too far in the past.');
            return;
        }

        if (endTime <= startTime) {
            alert('Exam end time must be after the start time.');
            return;
        }

        const validQuestions = questions.filter(q => q.text && q.text.trim().length > 0);
        if (validQuestions.length === 0) {
            alert('At least 1 question with text must be added to create an exam.');
            return;
        }

        const hasEmptyQuestions = questions.some(q => !q.text || q.text.trim() === '');
        if (hasEmptyQuestions) {
            alert('Some questions are empty. Please fill them out or remove them.');
            return;
        }

        const payload = {
            title: document.getElementById('exam_title').value,
            group_id: parseInt(document.getElementById('exam_group').value),
            start_time: new Date(document.getElementById('start_time').value).toISOString(),
            end_time: new Date(document.getElementById('end_time').value).toISOString(),
            duration_minutes: parseInt(document.getElementById('duration').value) || 0,
            timer_type: document.getElementById('timer_type').value,
            default_marks: parseFloat(document.getElementById('default_marks').value),
            default_negative_marks: parseFloat(document.getElementById('default_negative_marks').value),
            passing_marks: parseFloat(document.getElementById('passing_marks').value),
            questions: questions.map(q => ({
                text: q.text,
                marks: q.marks,
                negative_marks: q.negative_marks,
                time_limit_seconds: q.time_limit_seconds,
                options: q.options.map(o => ({
                    text: o.text,
                    is_correct: o.correct
                }))
            }))
        };

        const res = await fetch('/teacher/api/create_exam', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        if (res.ok) {
            window.location.href = '/teacher/dashboard';
        } else {
            alert('Error creating exam. Check inputs.');
        }
    }

    // Initialize with one question
    addQuestion();
</script>
{% endblock %}
